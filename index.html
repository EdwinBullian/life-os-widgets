<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habit Heatmap</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: #191919;
      overflow: hidden;
      width: 100%;
    }

    body {
      padding: 0.5rem 0.6rem 0.4rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    .heatmap-outer {
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    /* Month label row */
    .top-row {
      display: flex;
      gap: 4px;
      margin-bottom: 3px;
    }
    .day-label-spacer { width: 26px; flex-shrink: 0; }
    .month-row {
      display: flex;
      gap: 2px;
      flex: 1;
    }
    .month-slot {
      flex: 1;
      font-size: 10px;
      color: #5a5a5a;
      white-space: nowrap;
      overflow: visible;
      user-select: none;
    }

    /* Grid row */
    .grid-row {
      display: flex;
      gap: 4px;
      align-items: flex-start;
    }

    /* Day labels */
    .day-labels {
      display: flex;
      flex-direction: column;
      gap: 3px;
      width: 26px;
      flex-shrink: 0;
    }
    .day-label {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 4px;
      font-size: 10px;
      color: #5a5a5a;
      user-select: none;
    }

    /* Grid — fills full available width */
    .heatmap-grid {
      display: flex;
      gap: 2px;
      flex: 1;
    }
    .week-col {
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex: 1;
    }
    /* Cells: wider than tall (1.3:1 ratio) */
    .day-cell {
      width: 100%;
      aspect-ratio: 1.3 / 1;
      border-radius: 2px;
      cursor: pointer;
    }
    .day-cell:hover {
      outline: 1px solid rgba(255,255,255,0.35);
      outline-offset: 1px;
    }

    /* Color scale — same green as before */
    .c0 { background: #2a2a2a; border: 1px solid #363636; }
    .c1 { background: #0e4429; }
    .c2 { background: #006d32; }
    .c3 { background: #26a641; }
    .c4 { background: #39d353; }
    .no-entry { background: transparent; cursor: default; }

    /* Tooltip */
    .tooltip {
      position: fixed;
      background: #1c2128;
      border: 1px solid #444c56;
      border-radius: 6px;
      padding: 7px 11px;
      font-size: 12px;
      color: #e6edf3;
      pointer-events: none;
      z-index: 9999;
      display: none;
      white-space: nowrap;
      box-shadow: 0 4px 14px rgba(0,0,0,0.6);
      line-height: 1.55;
    }
    .tooltip strong { color: #3fb950; }
  </style>
</head>
<body>

<div class="heatmap-outer">
  <div class="top-row">
    <div class="day-label-spacer"></div>
    <div class="month-row" id="monthRow"></div>
  </div>
  <div class="grid-row">
    <div class="day-labels" id="dayLabels">
      <div class="day-label"></div>
      <div class="day-label">Mon</div>
      <div class="day-label"></div>
      <div class="day-label">Wed</div>
      <div class="day-label"></div>
      <div class="day-label">Fri</div>
      <div class="day-label"></div>
    </div>
    <div class="heatmap-grid" id="heatmapGrid"></div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
// ── HABIT DATA (from Notion, updated 2026-04-15) ──────────────────────────
// Value = completion % (out of 8 habits: Steps, Calories, Clean, Lift,
//         Screen Time, Meditate, Supplements, Stretch)
// 0 stored as -1 for "logged but 0 habits done"
const pctData = {
  // Jan 2026
  "2026-01-01": 88,
  "2026-01-02": 62,
  "2026-01-03": 100,
  "2026-01-04": 88,
  "2026-01-05": 88,
  "2026-01-06": 62,
  "2026-01-07": 88,
  "2026-01-08": 88,
  "2026-01-09": 75,
  "2026-01-10": 75,
  "2026-01-11": 75,
  "2026-01-12": 75,
  "2026-01-13": 62,
  "2026-01-14": 75,
  "2026-01-15": 88,
  "2026-01-16": 62,
  "2026-01-17": 75,
  "2026-01-18": 62,
  "2026-01-19": 88,
  "2026-01-20": 75,
  "2026-01-21": 75,
  "2026-01-22": 75,
  "2026-01-23": 75,
  "2026-01-24": 62,
  "2026-01-25": 62,
  "2026-01-26": 88,
  "2026-01-27": 88,
  "2026-01-28": 62,
  "2026-01-29": 75,
  "2026-01-30": 88,
  "2026-01-31": 75,

  // Feb 2026
  "2026-02-01": 75,
  "2026-02-02": 75,
  "2026-02-03": 75,
  "2026-02-04": 62,
  "2026-02-05": 88,
  "2026-02-06": 75,
  "2026-02-07": 75,
  "2026-02-08": 88,
  "2026-02-09": 75,
  "2026-02-10": 75,
  "2026-02-11": 75,
  "2026-02-12": 75,
  "2026-02-13": 75,
  "2026-02-14": 62,
  "2026-02-15": 50,
  "2026-02-16": 75,
  "2026-02-17": 75,
  "2026-02-18": 75,
  "2026-02-19": 88,
  "2026-02-20": 88,
  "2026-02-21": 75,
  "2026-02-22": 88,
  "2026-02-23": 75,
  "2026-02-24": 88,
  "2026-02-25": 75,
  "2026-02-26": 75,
  "2026-02-27": 62,
  "2026-02-28": 88,

  // Mar 2026
  "2026-03-01": 75,
  "2026-03-02": 62,
  "2026-03-03": 88,
  "2026-03-04": 88,
  "2026-03-05": 88,
  "2026-03-06": 75,
  "2026-03-07": 62,
  "2026-03-08": 75,
  "2026-03-09": 88,
  "2026-03-10": 62,
  "2026-03-11": 88,
  "2026-03-12": 100,
  "2026-03-13": 88,
  "2026-03-14": 100,
  "2026-03-15": 75,
  "2026-03-16": 100,
  "2026-03-17": 88,
  "2026-03-18": 75,
  "2026-03-19": 62,
  "2026-03-20": 75,
  "2026-03-21": 88,
  "2026-03-22": 75,
  "2026-03-23": 100,
  "2026-03-24": 88,
  "2026-03-25": 75,
  "2026-03-26": 88,
  "2026-03-27": 75,
  "2026-03-28": 62,
  "2026-03-29": 50,
  "2026-03-30": 62,
  "2026-03-31": 62,

  // Apr 2026
  "2026-04-01": 75,
  "2026-04-02": 88,
  "2026-04-03": 75,
  "2026-04-04": 75,
  "2026-04-05": 75,
  "2026-04-06": 50,
  "2026-04-07": 50,
  "2026-04-08": 62,
  "2026-04-09": 75,
  "2026-04-10": 62,
  "2026-04-11": 62,
  "2026-04-12": 88,
  "2026-04-13": 75,
  "2026-04-14": 62,
  "2026-04-15": 75,
};

function scoreLevel(pct) {
  if (pct <= 0)  return 1;   // logged but 0 habits → very dark
  if (pct <= 30) return 1;   // 1-2 habits
  if (pct <= 57) return 2;   // 3-4 habits
  if (pct <= 80) return 3;   // 5-6 habits
  return 4;                   // 7-8 habits
}

function pctLabel(pct) {
  if (pct < 0)   return "Logged — 0 / 8 habits";
  if (pct === 0) return "Logged — 0 / 8 habits";
  const habits = Math.round(pct / 100 * 8);
  return `${habits} / 8 habits (${pct}%)`;
}

// ── DATE RANGE: last 26 weeks (≈6 months) ────────────────────────────────
const NUM_WEEKS = 26;
const today = new Date("2026-04-15");
const startDate = new Date(today);
startDate.setDate(startDate.getDate() - NUM_WEEKS * 7);
startDate.setDate(startDate.getDate() - startDate.getDay()); // align Sunday

const gridEl   = document.getElementById("heatmapGrid");
const monthEl  = document.getElementById("monthRow");
const tooltip  = document.getElementById("tooltip");
const MONTHS   = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

let cur = new Date(startDate);
let weekIdx = 0;
const monthSlots = [];
let lastMonth = null;

while (cur <= today) {
  const weekCol = document.createElement("div");
  weekCol.className = "week-col";

  // Month label for this column
  let slotLabel = null;
  const ws = new Date(cur);
  for (let d = 0; d < 7; d++) {
    const cd = new Date(ws); cd.setDate(cd.getDate() + d);
    if (cd.getDate() === 1 || weekIdx === 0) {
      const mn = MONTHS[cd.getMonth()];
      if (mn !== lastMonth) { slotLabel = mn; lastMonth = mn; }
    }
  }
  monthSlots.push(slotLabel);

  for (let dow = 0; dow < 7; dow++) {
    const cell = document.createElement("div");
    const key  = cur.toISOString().slice(0, 10);
    const future  = cur > today;
    const hasData = pctData.hasOwnProperty(key);
    const pct     = pctData[key];

    cell.className = future   ? "day-cell no-entry"
                   : !hasData ? "day-cell c0"
                   :            `day-cell c${scoreLevel(pct)}`;

    if (!future) {
      const _k = key, _h = hasData, _p = pct;
      cell.addEventListener("mouseenter", () => {
        const label = _h ? pctLabel(_p) : "No entry";
        tooltip.innerHTML = `<strong>${_k}</strong><br>${label}`;
        tooltip.style.display = "block";
      });
      cell.addEventListener("mousemove", e => {
        tooltip.style.left = (e.clientX + 14) + "px";
        tooltip.style.top  = (e.clientY - 10) + "px";
      });
      cell.addEventListener("mouseleave", () => tooltip.style.display = "none");
    }

    weekCol.appendChild(cell);
    cur.setDate(cur.getDate() + 1);
  }

  gridEl.appendChild(weekCol);
  weekIdx++;
}

// Month labels row
monthSlots.forEach(label => {
  const s = document.createElement("div");
  s.className = "month-slot";
  s.textContent = label || "";
  monthEl.appendChild(s);
});

// Sync day label heights to rendered cell height
requestAnimationFrame(() => requestAnimationFrame(() => {
  const cell = document.querySelector(".day-cell");
  if (!cell) return;
  const h = cell.getBoundingClientRect().height;
  document.querySelectorAll(".day-label").forEach(el => {
    el.style.height = h + "px";
  });
}));
</script>
</body>
</html>

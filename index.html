<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habit Heatmap</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: #191919;
      overflow: hidden;
      width: 100%;
    }

    body {
      padding: 0.6rem 0.75rem 0.5rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    .heatmap-outer {
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    /* Month labels row */
    .top-row {
      display: flex;
      gap: 4px;
      margin-bottom: 3px;
      align-items: flex-end;
    }
    .day-label-spacer {
      width: 28px;
      flex-shrink: 0;
    }
    .month-row {
      display: flex;
      gap: 2px;
      flex: 1;
    }
    .month-slot {
      flex: 1;
      font-size: 10px;
      color: #666;
      white-space: nowrap;
      overflow: visible;
      user-select: none;
    }

    /* Main grid row */
    .grid-row {
      display: flex;
      gap: 4px;
      align-items: flex-start;
    }

    /* Day labels */
    .day-labels {
      display: flex;
      flex-direction: column;
      gap: 2px;
      width: 28px;
      flex-shrink: 0;
    }
    .day-label {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 5px;
      font-size: 10px;
      color: #666;
      user-select: none;
    }

    /* Heatmap grid — fills full width */
    .heatmap-grid {
      display: flex;
      gap: 2px;
      flex: 1;
    }
    .week-col {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
    }
    .day-cell {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 2px;
      cursor: pointer;
      transition: outline 0.08s;
    }
    .day-cell:hover {
      outline: 1px solid rgba(255,255,255,0.35);
      outline-offset: 1px;
    }

    /* Color scale */
    .c0 { background: #2d2d2d; border: 1px solid #3a3a3a; }
    .c1 { background: #0e4429; }
    .c2 { background: #006d32; }
    .c3 { background: #26a641; }
    .c4 { background: #39d353; }
    .no-entry { background: transparent; cursor: default; }

    /* Tooltip */
    .tooltip {
      position: fixed;
      background: #1c2128;
      border: 1px solid #444c56;
      border-radius: 6px;
      padding: 7px 11px;
      font-size: 12px;
      color: #e6edf3;
      pointer-events: none;
      z-index: 9999;
      display: none;
      white-space: nowrap;
      box-shadow: 0 4px 14px rgba(0,0,0,0.6);
      line-height: 1.5;
    }
    .tooltip strong { color: #3fb950; }
  </style>
</head>
<body>

<div class="heatmap-outer">
  <div class="top-row">
    <div class="day-label-spacer"></div>
    <div class="month-row" id="monthRow"></div>
  </div>
  <div class="grid-row">
    <div class="day-labels" id="dayLabels">
      <div class="day-label"></div>
      <div class="day-label">Mon</div>
      <div class="day-label"></div>
      <div class="day-label">Wed</div>
      <div class="day-label"></div>
      <div class="day-label">Fri</div>
      <div class="day-label"></div>
    </div>
    <div class="heatmap-grid" id="heatmapGrid"></div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
// ── HABIT DATA (from Notion, updated 2026-04-15) ──────────────────────────
// [10k Steps, Calories, Clean, Lift, Limit Screen Time, Meditate, Supplements]
const rawData = {
  "2026-01-05": [1,1,1,1,1,1,1],
  "2026-01-07": [1,1,1,1,1,1,0],
  "2026-01-09": [1,0,1,1,1,1,0],
  "2026-01-10": [1,1,1,0,1,1,0],
  "2026-01-11": [1,1,1,1,1,0,1],
  "2026-01-12": [0,0,1,1,1,1,1],
  "2026-01-15": [1,1,1,1,1,0,1],
  "2026-01-16": [0,1,1,0,1,1,1],
  "2026-01-18": [1,0,0,0,0,1,1],
  "2026-01-19": [1,1,1,0,1,1,1],
  "2026-01-20": [0,1,1,1,1,1,1],
  "2026-01-21": [1,1,1,1,0,0,1],
  "2026-01-22": [1,1,1,1,0,1,0],
  "2026-01-23": [1,1,1,1,1,1,0],
  "2026-01-24": [1,1,0,0,0,1,1],
  "2026-01-25": [1,1,1,1,0,0,0],
  "2026-01-26": [1,1,0,1,1,1,1],
  "2026-01-27": [1,1,0,1,1,1,1],
  "2026-01-28": [1,1,0,1,1,0,1],
  "2026-01-29": [1,1,1,0,1,1,1],
  "2026-01-30": [0,1,1,1,1,1,1],
  "2026-01-31": [1,1,1,1,0,0,1],
  "2026-02-15": [1,0,1,1,1,0,0],
  "2026-02-16": [0,1,1,0,1,1,1],
  "2026-02-17": [1,0,1,1,1,1,1],
};

const HABITS = ["10k Steps","Calories","Clean","Lift","Limit Screen Time","Meditate","Supplements"];

function habitCount(arr) { return arr ? arr.reduce((a,b) => a+b, 0) : 0; }
function scoreLevel(n) {
  if (n === 0) return 0;
  if (n <= 2) return 1;
  if (n <= 4) return 2;
  if (n <= 6) return 3;
  return 4;
}

const countMap = {};
for (const [d, arr] of Object.entries(rawData)) countMap[d] = habitCount(arr);

// ── DATE RANGE: last 26 weeks (≈6 months) ────────────────────────────────
const NUM_WEEKS = 26;
const today = new Date("2026-04-15");
const startDate = new Date(today);
startDate.setDate(startDate.getDate() - NUM_WEEKS * 7);
startDate.setDate(startDate.getDate() - startDate.getDay()); // align to Sunday

const gridEl = document.getElementById("heatmapGrid");
const monthRowEl = document.getElementById("monthRow");
const tooltip = document.getElementById("tooltip");
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

let cur = new Date(startDate);
let weekIdx = 0;
const monthSlots = [];
let lastMonth = null;

while (cur <= today) {
  const weekCol = document.createElement("div");
  weekCol.className = "week-col";

  // Determine if a new month starts this week
  let slotLabel = null;
  const ws = new Date(cur);
  for (let d = 0; d < 7; d++) {
    const cd = new Date(ws);
    cd.setDate(cd.getDate() + d);
    if (cd.getDate() === 1 || weekIdx === 0) {
      const mn = MONTHS[cd.getMonth()];
      if (mn !== lastMonth) { slotLabel = mn; lastMonth = mn; }
    }
  }
  monthSlots.push(slotLabel);

  for (let dow = 0; dow < 7; dow++) {
    const cell = document.createElement("div");
    const key = cur.toISOString().slice(0, 10);
    const future = cur > today;
    const has = rawData.hasOwnProperty(key);
    const cnt = countMap[key] || 0;

    cell.className = future ? "day-cell no-entry"
                   : !has   ? "day-cell c0"
                   :          `day-cell c${scoreLevel(cnt)}`;

    if (!future) {
      const _k=key, _c=cnt, _h=has, _a=rawData[key];
      cell.addEventListener("mouseenter", () => {
        let html = `<strong>${_k}</strong><br>`;
        if (!_h)      html += "No entry logged";
        else if (_c===0) html += "0 / 7 habits";
        else {
          html += `${_c} / 7 habits`;
          if (_a) HABITS.forEach((h,i) => { if (_a[i]) html += `<br>✓ ${h}`; });
        }
        tooltip.innerHTML = html;
        tooltip.style.display = "block";
      });
      cell.addEventListener("mousemove", e => {
        tooltip.style.left = (e.clientX + 14) + "px";
        tooltip.style.top  = (e.clientY - 10) + "px";
      });
      cell.addEventListener("mouseleave", () => tooltip.style.display = "none");
    }

    weekCol.appendChild(cell);
    cur.setDate(cur.getDate() + 1);
  }

  gridEl.appendChild(weekCol);
  weekIdx++;
}

// Build month row with one flex slot per week column
monthSlots.forEach(label => {
  const s = document.createElement("div");
  s.className = "month-slot";
  s.textContent = label || "";
  monthRowEl.appendChild(s);
});

// Sync day-label heights to match rendered cell height
requestAnimationFrame(() => {
  requestAnimationFrame(() => {
    const cell = document.querySelector(".day-cell");
    if (!cell) return;
    const h = cell.getBoundingClientRect().height;
    document.querySelectorAll(".day-label").forEach(el => {
      el.style.height = h + "px";
    });
  });
});
</script>
</body>
</html>

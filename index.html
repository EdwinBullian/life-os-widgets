<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habit Heatmap</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: #191919;
      overflow: hidden;
      width: 100%;
    }

    body {
      padding: 0.5rem 0.6rem 0.4rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    .heatmap-outer {
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    /* Month label row */
    .top-row {
      display: flex;
      gap: 4px;
      margin-bottom: 3px;
    }
    .day-label-spacer { width: 26px; flex-shrink: 0; }
    .month-row {
      display: flex;
      gap: 2px;
      flex: 1;
    }
    .month-slot {
      flex: 1;
      font-size: 10px;
      color: #5a5a5a;
      white-space: nowrap;
      overflow: visible;
      user-select: none;
    }

    /* Grid row */
    .grid-row {
      display: flex;
      gap: 4px;
      align-items: flex-start;
    }

    /* Day labels */
    .day-labels {
      display: flex;
      flex-direction: column;
      gap: 3px;
      width: 26px;
      flex-shrink: 0;
    }
    .day-label {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 4px;
      font-size: 10px;
      color: #5a5a5a;
      user-select: none;
    }

    /* Grid */
    .heatmap-grid {
      display: flex;
      gap: 2px;
      flex: 1;
    }
    .week-col {
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex: 1;
    }
    .day-cell {
      width: 100%;
      aspect-ratio: 1.3 / 1;
      border-radius: 2px;
      cursor: pointer;
    }
    .day-cell:hover {
      outline: 1px solid rgba(255,255,255,0.35);
      outline-offset: 1px;
    }

    .c0 { background: #2a2a2a; border: 1px solid #363636; }
    .c1 { background: #0e4429; }
    .c2 { background: #006d32; }
    .c3 { background: #26a641; }
    .c4 { background: #39d353; }
    .no-entry { background: transparent; cursor: default; }

    /* Tooltip */
    .tooltip {
      position: fixed;
      background: #1c2128;
      border: 1px solid #444c56;
      border-radius: 6px;
      padding: 7px 11px;
      font-size: 12px;
      color: #e6edf3;
      pointer-events: none;
      z-index: 9999;
      display: none;
      white-space: nowrap;
      box-shadow: 0 4px 14px rgba(0,0,0,0.6);
      line-height: 1.55;
    }
    .tooltip strong { color: #3fb950; }
  </style>
</head>
<body>

<div class="heatmap-outer">
  <div class="top-row">
    <div class="day-label-spacer"></div>
    <div class="month-row" id="monthRow"></div>
  </div>
  <div class="grid-row">
    <div class="day-labels" id="dayLabels">
      <div class="day-label"></div>
      <div class="day-label">Mon</div>
      <div class="day-label"></div>
      <div class="day-label">Wed</div>
      <div class="day-label"></div>
      <div class="day-label">Fri</div>
      <div class="day-label"></div>
    </div>
    <div class="heatmap-grid" id="heatmapGrid"></div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
let pctData      = {};
let totalHabits  = 8;

function scoreLevel(pct) {
  if (pct <= 0)  return 1;
  if (pct <= 30) return 1;
  if (pct <= 57) return 2;
  if (pct <= 80) return 3;
  return 4;
}

function pctLabel(pct) {
  if (pct <= 0) return `0 / ${totalHabits} habits (0%)`;
  const done = Math.round(pct / 100 * totalHabits);
  return `${done} / ${totalHabits} habits &nbsp;·&nbsp; ${pct}%`;
}

function fmtDate(dateStr) {
  // "2026-04-15" → "Wed, Apr 15, 2026"
  const d = new Date(dateStr + "T12:00:00");
  return d.toLocaleDateString("en-US", { weekday:"short", month:"short", day:"numeric", year:"numeric" });
}

function buildGrid() {
  const NUM_WEEKS = 26;
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const startDate = new Date(today);
  startDate.setDate(startDate.getDate() - NUM_WEEKS * 7);
  startDate.setDate(startDate.getDate() - startDate.getDay()); // align Sunday

  const gridEl  = document.getElementById("heatmapGrid");
  const monthEl = document.getElementById("monthRow");
  const tip     = document.getElementById("tooltip");
  const MONTHS  = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  gridEl.innerHTML  = "";
  monthEl.innerHTML = "";

  let cur = new Date(startDate);
  let weekIdx = 0;
  const monthSlots = [];
  let lastMonth = null;

  while (cur <= today) {
    const weekCol = document.createElement("div");
    weekCol.className = "week-col";

    let slotLabel = null;
    const ws = new Date(cur);
    for (let d = 0; d < 7; d++) {
      const cd = new Date(ws); cd.setDate(cd.getDate() + d);
      if (cd.getDate() === 1 || weekIdx === 0) {
        const mn = MONTHS[cd.getMonth()];
        if (mn !== lastMonth) { slotLabel = mn; lastMonth = mn; }
      }
    }
    monthSlots.push(slotLabel);

    for (let dow = 0; dow < 7; dow++) {
      const cell    = document.createElement("div");
      const key     = cur.toISOString().slice(0, 10);
      const future  = cur > today;
      const hasData = Object.prototype.hasOwnProperty.call(pctData, key);
      const pct     = pctData[key];

      cell.className = future   ? "day-cell no-entry"
                     : !hasData ? "day-cell c0"
                     :            `day-cell c${scoreLevel(pct)}`;

      if (!future) {
        const _k = key, _h = hasData, _p = pct;
        cell.addEventListener("mouseenter", () => {
          const label = _h ? pctLabel(_p) : "No entry";
          tip.innerHTML = `<strong>${fmtDate(_k)}</strong><br>${label}`;
          tip.style.display = "block";
        });
        cell.addEventListener("mousemove", e => {
          tip.style.left = (e.clientX + 14) + "px";
          tip.style.top  = (e.clientY - 10) + "px";
        });
        cell.addEventListener("mouseleave", () => tip.style.display = "none");
      }

      weekCol.appendChild(cell);
      cur.setDate(cur.getDate() + 1);
    }

    gridEl.appendChild(weekCol);
    weekIdx++;
  }

  monthSlots.forEach(label => {
    const s = document.createElement("div");
    s.className = "month-slot";
    s.textContent = label || "";
    monthEl.appendChild(s);
  });

  requestAnimationFrame(() => requestAnimationFrame(() => {
    const cell = document.querySelector(".day-cell");
    if (!cell) return;
    const h = cell.getBoundingClientRect().height;
    document.querySelectorAll(".day-label").forEach(el => el.style.height = h + "px");
  }));
}

async function load() {
  try {
    const r = await fetch("./habits.json?t=" + Date.now());
    if (!r.ok) throw new Error("no json");
    const j = await r.json();
    pctData     = j.habits      || {};
    totalHabits = j.totalHabits || 8;
  } catch {
    console.warn("habits.json unavailable — rendering empty grid");
  }
  buildGrid();
}

load();
</script>
</body>
</html>
